# Homelab standup simulation: evaluates whether a single-agent model can
# roleplay three distinct homelab personas (SRE, Dev, Manager) and produce
# a structured status report from a given context document.
#
# Model routing: uses ollama/<model> which routes through LITELLM_API_BASE
# (default http://localhost:4000/v1). Override with:
#   export LITELLM_API_BASE=http://<your-proxy>:4000/v1
#
# The input_file below uses the bundled multi-agent-patterns.md as a
# stand-in for a real standup brief. Replace with your own context doc
# (e.g. a ROADMAP.md or sprint notes) to run the full homelab scenario.

experiment_name: "Homelab Standup Simulation Evaluation"
workflow: "single_agent"
system_prompt: "You are an advanced AI assistant capable of roleplaying multiple personas. Produce three distinct status report sections — one for each persona listed in the provided context."
orchestrator_models:
  - "ollama/qwen2.5-coder:14b"
  - "ollama/llama3.1:8b"
judge_model: "ollama/qwen2.5-coder:14b"
test_cases:
  - name: "Persona Tone and Content Adherence"
    input_file: "examples/inputs/multi-agent-patterns.md"
    task_prompt: "Using the provided document as context, write three short status updates in the voice of: (1) an SRE focused on reliability and incidents, (2) a developer focused on features and code quality, and (3) an engineering manager focused on project health and next steps."
    expected_output_criteria: "The output MUST contain three clearly labelled sections for SRE, Developer, and Manager. Each section MUST maintain a distinct tone appropriate to that role. The SRE section MUST mention reliability or incidents. The Developer section MUST mention code or features. The Manager section MUST mention next steps or project health. The output MUST NOT repeat the same sentence verbatim across sections."
